// Flat arrays for easy access
const WORKS = Object.entries(LEKTURY_DATA).map(([id, d]) => ({ id, ...d }));
const MOTIFS = Object.entries(MOTYWY_DATA).map(([id, d]) => ({ id, ...d }));

// Filter only motifs with at least 1 lektura (g or p)
const MOTIFS_ACTIVE = MOTIFS.filter(m => m.g.length + m.p.length > 0);
const WORKS_WITH_MOTIFS = WORKS.filter(w => w.g.length > 0);

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function pickDistractors(correctIds, pool, n) {
  return shuffle(pool.filter(x => !correctIds.includes(x))).slice(0, n);
}

// ─── QUESTION GENERATORS ────────────────────────────────

function genMatchMotywDoLektury(n = 8) {
  // Pokazujemy lekturę, gracz wybiera JEDEN motyw główny.
  // Poprawna = DOWOLNA odpowiedź z work.g (wszystkie główne).
  // Dystraktorzy: motywy których lektura nie ma wcale (nie g, nie p).
  const qs = [];
  const pool = shuffle(WORKS_WITH_MOTIFS.filter(w => w.g.length >= 1));
  for (let i = 0; i < Math.min(n, pool.length); i++) {
    const work = pool[i];
    const correctIds = work.g; // wszystkie główne
    const shownCorrectId = rnd(correctIds); // ten jeden pojawi się w opcjach jako "wzorcowy"
    const notRelated = MOTIFS_ACTIVE.map(m => m.id)
      .filter(id => !correctIds.includes(id) && !work.p.includes(id));
    const wrongIds = shuffle(notRelated).slice(0, 3);
    // opcje: jeden główny + 3 niezwiązanych
    const options = shuffle([shownCorrectId, ...wrongIds])
      .map(id => ({ id, label: MOTYWY_DATA[id]?.label || id }));
    const correctLabels = correctIds.map(id => MOTYWY_DATA[id]?.label || id).join(', ');
    qs.push({ type: 'match_motyw', work, correctIds, shownCorrectId, options,
      feedbackOk: `Dobrze! To jeden z głównych motywów tej lektury.`,
      feedbackBlad: `Główne motywy tej lektury to: ${correctLabels}.` });
  }
  return qs;
}

function genMatchLekturaDoMotywu(n = 8) {
  // Pokazujemy motyw, gracz wybiera lekturę w której jest GŁÓWNY.
  // Poprawna = DOWOLNA lektura z motif.g.
  // Dystraktorzy: lektury które tego motywu nie mają wcale (nie g, nie p).
  const qs = [];
  const pool = shuffle(MOTIFS_ACTIVE.filter(m => m.g.length >= 1));
  for (let i = 0; i < Math.min(n, pool.length); i++) {
    const motif = pool[i];
    const correctIds = motif.g;
    const shownCorrectId = rnd(correctIds);
    const correct = LEKTURY_DATA[shownCorrectId];
    if (!correct) continue;
    const notRelated = WORKS.map(w => w.id)
      .filter(id => !correctIds.includes(id) && !motif.p.includes(id));
    const wrongIds = shuffle(notRelated).slice(0, 3);
    const options = shuffle([shownCorrectId, ...wrongIds])
      .map(id => ({ id, title: LEKTURY_DATA[id]?.title || id }));
    const correctTitles = correctIds
      .map(id => (LEKTURY_DATA[id]?.title || id).replace(/^[^,]+,\s*/, '').split('(')[0].trim())
      .join(', ');
    qs.push({ type: 'match_lektura', motif, correctIds, shownCorrectId, options,
      feedbackOk: `Dobrze! Motyw "${motif.label}" jest główny w tej lekturze.`,
      feedbackBlad: `Motyw "${motif.label}" jest główny w: ${correctTitles}.` });
  }
  return qs;
}

function genNetwork() {
  const EPOCH_GROUPS_ANCIENT = ['biblia_ksiega_rodzaju','biblia_ksiega_hioba','biblia_ksiega_koheleta',
    'biblia_ksiega_psalmow','biblia_apokalipsa_sw_jana','homer_iliada_fragmenty',
    'sofokles_antygona','piesn_o_rolandzie_fragmenty','lament_swietokrzyski_fragmenty',
    'rozmowa_mistrza_polikarpa_ze_smiercia_fragmenty'];

  const motif = rnd(MOTIFS_ACTIVE.filter(m => m.g.length >= 2));
  const correctIds = motif.g;
  const correctWorks = correctIds
    .map(id => LEKTURY_DATA[id] ? { id, ...LEKTURY_DATA[id] } : null)
    .filter(Boolean);

  const wrongAll = shuffle(
    WORKS.filter(w => !correctIds.includes(w.id) && !motif.p.includes(w.id))
  );

  let ancientCount = correctWorks.filter(w => EPOCH_GROUPS_ANCIENT.includes(w.id)).length;
  const balancedWrong = [];
  for (const w of wrongAll) {
    const isAncient = EPOCH_GROUPS_ANCIENT.includes(w.id);
    if (isAncient && ancientCount >= 2) continue;
    if (isAncient) ancientCount++;
    balancedWrong.push(w);
    if (balancedWrong.length >= 6) break;
  }

  const poolCorrect = shuffle(correctWorks).slice(0, Math.min(4, correctWorks.length));
  const poolWrong = balancedWrong.slice(0, 12 - poolCorrect.length);
  const pool = shuffle([...poolCorrect, ...poolWrong]);
  return { motif, correctIds, pool };
}

function genConstellation() {
  const EPOCH_GROUPS_ANCIENT = ['biblia_ksiega_rodzaju','biblia_ksiega_hioba','biblia_ksiega_koheleta',
    'biblia_ksiega_psalmow','biblia_apokalipsa_sw_jana','homer_iliada_fragmenty',
    'sofokles_antygona','piesn_o_rolandzie_fragmenty','lament_swietokrzyski_fragmenty',
    'rozmowa_mistrza_polikarpa_ze_smiercia_fragmenty'];

  const motif = rnd(MOTIFS_ACTIVE.filter(m => m.g.length >= 2 && m.g.length <= 6));
  const allCorrectIds = motif.g;
  const allCorrectWorks = allCorrectIds
    .map(id => LEKTURY_DATA[id] ? { id, ...LEKTURY_DATA[id] } : null)
    .filter(Boolean);

  const wrongAll = shuffle(WORKS.filter(w => !allCorrectIds.includes(w.id) && !motif.p.includes(w.id)));
  let ancientCount = 0;
  const wrongWorks = [];
  for (const w of wrongAll) {
    const isAncient = EPOCH_GROUPS_ANCIENT.includes(w.id);
    if (isAncient && ancientCount >= 2) continue;
    if (isAncient) ancientCount++;
    wrongWorks.push(w);
    if (wrongWorks.length >= 6) break;
  }

  const poolCorrect = shuffle(allCorrectWorks).slice(0, Math.min(3, allCorrectWorks.length));
  const poolWrong = wrongWorks.slice(0, 9 - poolCorrect.length);
  const pool = shuffle([...poolCorrect, ...poolWrong]);
  const correctIds = allCorrectIds.filter(id => pool.some(w => w.id === id));
  return { motif, correctIds, allCorrectIds, pool };
}

function MatchMode({ modeId, onDone, onMastery }) {
  const isMotyw = modeId === 'match_motyw';
  const [qs] = useState(() => isMotyw ? genMatchMotywDoLektury(9) : genMatchLekturaDoMotywu(9));
  const [idx, setIdx] = useState(0);
  // Use ref for score to avoid async state bug in onDone
  const scoreRef = useRef(0);
  const [scoreDisp, setScoreDisp] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [wrong, setWrong] = useState(0);
  const [sel, setSel] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const q = qs[idx];
  if (!q) return null;

  const pick = (id) => {
    if (sel) return;
    setSel(id);
    setRevealed(true);
    // Poprawna = dowolny motyw/lektura z tablicy correctIds
    const ok = q.correctIds.includes(id);
    if (ok) { scoreRef.current += 1; setScoreDisp(scoreRef.current); setCorrect(n => n+1); }
    else { setWrong(n => n+1); }
    onMastery(isMotyw ? q.work.id : q.motif.id, ok);
  };

  const next = () => {
    setSel(null); setRevealed(false);
    if (idx + 1 >= qs.length) {
      onDone({ score: scoreRef.current, total: qs.length, xpGained: scoreRef.current * 10, mode: modeId });
    } else {
      setIdx(i => i + 1);
    }
  };

  const isOk = sel !== null && q.correctIds.includes(sel);

  // Dla panelu feedbacku: pokazujemy motywy lektury lub lektury dla motywu
  const correctWorkId = isMotyw ? q.work.id : q.shownCorrectId;
  const correctMotifId = isMotyw ? q.shownCorrectId : q.motif?.id;
  const correctWorkMotifs = (LEKTURY_DATA[correctWorkId]?.g || [])
    .map(mid => ({ id: mid, label: MOTYWY_DATA[mid]?.label || mid }));

  // Build feedback message
  const feedbackMsg = () => {
    if (isOk) return q.feedbackOk;
    return q.feedbackBlad;
  };

  return <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
    <GameHeader idx={idx} total={qs.length} scoreDisp={scoreDisp} correct={correct} wrong={wrong} label={isMotyw?'Motyw do lektury':'Lektura do motywu'} />
    <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:16, display:'flex', flexDirection:'column', gap:14 }}>

        {isMotyw
          ? <div style={{ ...mkCard(), background:C.pLight }}>
              <p style={{ fontSize:11, fontWeight:500, color:C.primary, textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:4 }}>Lektura</p>
              <p style={{ fontSize:20, fontWeight:500, color:C.primary }}>{q.work.title}</p>
              <p style={{ fontSize:12, color:C.primary, opacity:0.7, marginTop:4 }}>Który motyw jest w niej główny?</p>
            </div>
          : <div style={{ ...mkCard(), background:C.tLight }}>
              <p style={{ fontSize:11, fontWeight:500, color:C.teal, textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:4 }}>Motyw</p>
              <p style={{ fontSize:20, fontWeight:500, color:C.teal }}>{q.motif.label}</p>
              <p style={{ fontSize:12, color:C.teal, opacity:0.7, marginTop:4 }}>Która lektura ma ten motyw jako główny?</p>
            </div>
        }

        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {q.options.map(opt => {
            const id = opt.id;
            const isCorrect = revealed && q.correctIds.includes(id);
            const isWrong = revealed && sel === id && !isCorrect;
            return <button key={id} onClick={() => pick(id)} disabled={!!sel} style={{
              textAlign:'left', padding:'13px 16px', borderRadius:12,
              cursor: sel ? 'default' : 'pointer',
              background: isCorrect ? C.tLight : isWrong ? C.cLight : C.surf,
              border: isCorrect ? `2px solid ${C.teal}` : isWrong ? `2px solid ${C.coral}` : `0.5px solid ${C.brd}`,
              color: isCorrect ? C.teal : isWrong ? C.coral : C.text,
              fontWeight: isCorrect ? 600 : 500, fontSize:14, transition:'all 0.2s',
              display:'flex', justifyContent:'space-between', alignItems:'center',
            }}>
              <span>{isMotyw ? opt.label : opt.title}</span>
              {isCorrect && <span style={{ fontSize:16 }}>✓</span>}
              {isWrong && <span style={{ fontSize:16 }}>✗</span>}
            </button>;
          })}
        </div>
      </div>

      {revealed && <div style={{ padding:'0 16px 16px', display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ ...mkCard(), background: isOk?C.tLight:C.cLight, borderLeft:`4px solid ${isOk?C.teal:C.coral}` }}>
          <p style={{ fontWeight:500, fontSize:15, color:isOk?C.teal:C.coral, marginBottom:8 }}>
            {isOk ? '✓ Dobrze!' : '✗ Nie tym razem'}
          </p>
          <p style={{ fontSize:14, color:isOk?C.teal:C.coral, lineHeight:1.55, marginBottom: correctWorkMotifs.length>0?10:0 }}>
            {feedbackMsg()}
          </p>
          {correctWorkMotifs.length > 0 && <>
            <p style={{ fontSize:11, fontWeight:500, color:isOk?C.teal:C.coral, opacity:0.75, textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:6 }}>
              Wszystkie motywy główne „{(LEKTURY_DATA[correctWorkId]?.title||'').replace(/^[^,]+,\s*/,'').split('(')[0].trim()}”:
            </p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
              {correctWorkMotifs.map(m =>
                <Badge key={m.id} text={m.label}
                  color={m.id===correctMotifId ? (isOk?C.teal:C.coral) : C.muted}
                  bg={m.id===correctMotifId ? (isOk?'rgba(15,110,86,0.12)':'rgba(216,90,48,0.1)') : 'rgba(0,0,0,0.05)'} />
              )}
            </div>
          </>}
        </div>
        <button style={mkBtn('primary')} onClick={next}>
          {idx+1 >= qs.length ? 'Zobacz wynik →' : 'Dalej →'}
        </button>
      </div>}
    </div>
  </div>;
}

function NetworkMode({ onDone, onMastery }) {
  const [q] = useState(() => genNetwork());
  const [sel, setSel] = useState([]);
  const [done, setDone] = useState(false);
  const [hits, setHits] = useState(0);
  const MAX = Math.min(q.correctIds.length + 1, 6);

  const toggle = id => {
    if (done) return;
    setSel(s => s.includes(id) ? s.filter(x=>x!==id) : s.length < MAX ? [...s,id] : s);
  };

  const submit = () => {
    if (done || sel.length === 0) return;
    const h = sel.filter(id => q.correctIds.includes(id)).length;
    setHits(h);
    setDone(true);
    sel.forEach(id => onMastery(id, q.correctIds.includes(id)));
    // also mark correct ones not selected as wrong
    q.correctIds.forEach(id => { if (!sel.includes(id)) onMastery(id, false); });
  };

  const finish = () => {
    const pct = Math.round(hits / Math.max(q.correctIds.length, 1) * 100);
    onDone({ score: pct, total: 100, xpGained: Math.round(pct / 10), mode: 'network' });
  };

  const shortTitle = id => (LEKTURY_DATA[id]?.title || id).replace(/^[^,]+,\s*/, '').split('(')[0].trim();

  const correctSelected = sel.filter(id => q.correctIds.includes(id)).length;
  const wrongSelected = sel.filter(id => !q.correctIds.includes(id)).length;

  return <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
    <div style={{ padding:'10px 16px 8px', background:C.surf, borderBottom:`0.5px solid ${C.brd}` }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:7 }}>
        <span style={{ fontSize:13, fontWeight:500, color:C.teal }}>Sieć skojarzeń</span>
        <div style={{ display:'flex', gap:8 }}>
          <span style={{ fontSize:13, fontWeight:600, color:C.teal }}>✓ {correctSelected}</span>
          <span style={{ fontSize:13, fontWeight:600, color:C.coral }}>✗ {wrongSelected}</span>
          <span style={{ fontSize:12, color:C.muted }}>szukaj: {q.correctIds.length}</span>
        </div>
      </div>
      <div style={{ height:6, background:C.tLight, borderRadius:3 }}>
        <div style={{ width:`${Math.min(100, correctSelected/Math.max(q.correctIds.length,1)*100)}%`, height:'100%', background:C.teal, borderRadius:3, transition:'width 0.3s' }} />
      </div>
    </div>
    <div style={{ flex:1, overflowY:'auto', padding:16, display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ ...mkCard(), background:C.tLight }}>
        <p style={{ fontSize:11, fontWeight:500, color:C.teal, textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:4 }}>Motyw</p>
        <p style={{ fontSize:20, fontWeight:500, color:C.teal }}>{q.motif.label}</p>
        <p style={{ fontSize:13, color:C.teal, opacity:0.75, marginTop:2 }}>
          Zaznacz wszystkie lektury, w których ten motyw jest <strong>główny</strong> (score 1)
        </p>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
        {q.pool.map(w => {
          const isSel = sel.includes(w.id);
          const isCorrect = q.correctIds.includes(w.id);
          const isOk = done && isCorrect;
          const isErr = done && isSel && !isCorrect;
          const isMissed = done && !isSel && isCorrect;
          return <button key={w.id} onClick={() => toggle(w.id)} disabled={done} style={{
            padding:'10px 6px', borderRadius:10, textAlign:'center', cursor: done?'default':'pointer',
            background: isOk ? C.tLight : isErr ? C.cLight : isMissed ? C.aLight : isSel ? C.pLight : C.surf,
            border: isOk ? `2px solid ${C.teal}` : isErr ? `2px solid ${C.coral}` : isMissed ? `2px solid ${C.amber}` : isSel ? `2px solid ${C.primary}` : `0.5px solid ${C.brd}`,
            fontSize:11, fontWeight:500, lineHeight:1.4, transition:'all 0.2s',
            color: isOk ? C.teal : isErr ? C.coral : isMissed ? C.amber : isSel ? C.primary : C.text,
          }}>
            {shortTitle(w.id)}
            {isOk && <span style={{display:'block', fontSize:13}}>✓</span>}
            {isErr && <span style={{display:'block', fontSize:13}}>✗</span>}
            {isMissed && <span style={{display:'block', fontSize:13}}>!</span>}
          </button>;
        })}
      </div>

      {!done
        ? <>
            <button style={{ ...mkBtn('teal'), opacity:sel.length>0?1:0.4 }} disabled={sel.length===0} onClick={submit}>
              Sprawdź zaznaczenie
            </button>
          </>
        : <>
            <div style={{ ...mkCard(), background: hits===q.correctIds.length ? C.tLight : hits>0 ? C.aLight : C.cLight }}>
              <p style={{ fontSize:16, fontWeight:600, color: hits===q.correctIds.length?C.teal:hits>0?C.amber:C.coral, marginBottom:8 }}>
                {hits}/{q.correctIds.length} poprawnych odpowiedzi
              </p>
              <p style={{ fontSize:12, fontWeight:500, color:C.muted, marginBottom:6 }}>Wszystkie lektury z motywem „{q.motif.label}" (wyniki główne):</p>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {q.correctIds.map(id => {
                  const hit = sel.includes(id);
                  return <span key={id} style={{ fontSize:12, padding:'3px 8px', borderRadius:6,
                    background: hit?C.tLight:C.aLight, color: hit?C.teal:C.amber, fontWeight:500 }}>
                    {hit?'✓ ':''}{shortTitle(id)}
                  </span>;
                })}
              </div>
            </div>
            <button style={mkBtn('primary')} onClick={finish}>Dalej →</button>
          </>
      }
    </div>
  </div>;
}

function ScaleMode({ onDone, onMastery }) {
  const [qs] = useState(() => Array.from({length:5}, genScale));
  const [idx, setIdx] = useState(0);
  const scoreRef = useRef(0);
  const [scoreDisp, setScoreDisp] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [wrong, setWrong] = useState(0);
  const [chosen, setChosen] = useState(null);
  const q = qs[idx];
  if (!q) return null;

  const choose = side => {
    if (chosen) return;
    setChosen(side);
    const ok = side === q.correctSide;
    if (ok) { scoreRef.current += 1; setScoreDisp(scoreRef.current); setCorrect(n=>n+1); }
    else setWrong(n=>n+1);
    onMastery(q.work.id, ok);
  };

  const next = () => {
    setChosen(null);
    if (idx+1>=qs.length) onDone({ score: scoreRef.current, total:qs.length, xpGained:scoreRef.current*15, mode:'scale' });
    else setIdx(i=>i+1);
  };

  const isOk = chosen === q.correctSide;

  const oStyle = side => {
    const isSel = chosen===side, isCorrect = q.correctSide===side;

function ConstellationMode({ onDone, onMastery }) {
  const [q] = useState(() => genConstellation());
  const [sel, setSel] = useState([]);
  const [done, setDone] = useState(false);
  const [hits, setHits] = useState(0);
  const MAX_SEL = q.correctIds.length + 1;

  const toggle = id => {
    if (done) return;
    setSel(s => s.includes(id) ? s.filter(x=>x!==id) : s.length<MAX_SEL ? [...s,id] : s);
  };

  const submit = () => {
    if (done || sel.length===0) return;
    const h = sel.filter(id=>q.correctIds.includes(id)).length;
    setHits(h);
    setDone(true);
    sel.forEach(id => onMastery(id, q.correctIds.includes(id)));
    q.correctIds.forEach(id => { if (!sel.includes(id)) onMastery(id, false); });
  };

  const finish = () => onDone({ score:hits, total:Math.max(q.correctIds.length,1), xpGained:hits*12, mode:'constellation' });
  const shortT = id => (LEKTURY_DATA[id]?.title||id).replace(/^[^,]+,\s*/,'').split('(')[0].trim();

  const correctSel = sel.filter(id => q.correctIds.includes(id)).length;
  const wrongSel = sel.filter(id => !q.correctIds.includes(id)).length;

  return <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
    <div style={{ padding:'10px 16px 8px', background:C.surf, borderBottom:`0.5px solid ${C.brd}` }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:7 }}>
        <span style={{ fontSize:13, fontWeight:500, color:C.primary }}>Konstelacje</span>
        <div style={{ display:'flex', gap:8 }}>
          <span style={{ fontSize:13, fontWeight:600, color:C.teal }}>✓ {correctSel}</span>
          <span style={{ fontSize:13, fontWeight:600, color:C.coral }}>✗ {wrongSel}</span>
          <span style={{ fontSize:12, color:C.muted }}>szukaj: {q.correctIds.length}</span>
        </div>
      </div>
      <div style={{ height:6, background:C.pLight, borderRadius:3 }}>
        <div style={{ width:`${Math.min(100, (sel.filter(id=>q.correctIds.includes(id)).length)/Math.max(q.correctIds.length,1)*100)}%`, height:'100%', background:C.primary, borderRadius:3, transition:'width 0.3s' }} />
      </div>
    </div>
    <div style={{ flex:1, overflowY:'auto', padding:16, display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ ...mkCard(), background:C.pLight }}>
        <p style={{ fontSize:11, fontWeight:500, color:C.primary, textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:4 }}>Motyw konstelacji</p>
        <p style={{ fontSize:20, fontWeight:500, color:C.primary }}>{q.motif.label}</p>
        <p style={{ fontSize:13, color:C.primary, opacity:0.75, marginTop:2 }}>Wybierz lektury, w których ten motyw jest główny</p>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
        {q.pool.map(w => {
          const isSel = sel.includes(w.id);
          const isCorrect = q.correctIds.includes(w.id);
          const isOk = done && isCorrect;
          const isErr = done && isSel && !isCorrect;
          const isMissed = done && !isSel && isCorrect;
          return <button key={w.id} onClick={() => toggle(w.id)} disabled={done} style={{
            padding:'10px 6px', borderRadius:10, textAlign:'center', cursor:done?'default':'pointer',
            background: isOk?C.tLight:isErr?C.cLight:isMissed?C.aLight:isSel?C.pLight:C.surf,
            border: isOk?`2px solid ${C.teal}`:isErr?`2px solid ${C.coral}`:isMissed?`2px solid ${C.amber}`:isSel?`2px solid ${C.primary}`:`0.5px solid ${C.brd}`,
            fontSize:11, fontWeight:500, lineHeight:1.4, transition:'all 0.2s',
            color: isOk?C.teal:isErr?C.coral:isMissed?C.amber:isSel?C.primary:C.text,
          }}>
            {shortT(w.id)}
            {isOk && <span style={{display:'block',fontSize:13}}>✓</span>}
            {isErr && <span style={{display:'block',fontSize:13}}>✗</span>}
            {isMissed && <span style={{display:'block',fontSize:13}}>!</span>}
          </button>;
        })}
      </div>
      {!done
        ? <>
            <button style={{ ...mkBtn('primary'), opacity:sel.length>0?1:0.4 }} disabled={sel.length===0} onClick={submit}>Sprawdź ({sel.length}/{MAX})</button>
          </>
        : <>
            <div style={{ ...mkCard(), background:hits>=q.correctIds.length?C.tLight:hits>0?C.aLight:C.cLight }}>
              <p style={{ fontSize:16, fontWeight:600, color:hits>=q.correctIds.length?C.teal:hits>0?C.amber:C.coral, marginBottom:8 }}>
                {hits}/{q.correctIds.length} trafnych
              </p>
              <p style={{ fontSize:12, fontWeight:500, color:C.muted, marginBottom:6 }}>Wszystkie lektury z motywem „{q.motif.label}” jako głównym:</p>
              <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
                {q.correctIds.map(id => {
                  const hit = sel.includes(id);
                  return <span key={id} style={{ fontSize:12, padding:'3px 8px', borderRadius:6,
                    background:hit?C.tLight:C.aLight, color:hit?C.teal:C.amber, fontWeight:500 }}>
                    {hit?'✓ ':''}{shortT(id)}
                  </span>;
                })}
              </div>
            </div>
            <button style={mkBtn('primary')} onClick={finish}>Dalej →</button>
          </>
      }
    </div>
  </div>;
}

function ChronoMode({ onDone }) {
  const [data] = useState(() => genChrono(5));
  const { items, epochMap, epochAlt, epochOrder } = data;
  const [asgn, setAsgn] = useState({});
  const [done, setDone] = useState(false);
  const [correct, setCorrect] = useState(0);

  const assign = (id, ep) => { if (!done) setAsgn(a => ({...a,[id]:ep})); };

  // Odpowiedź poprawna jeśli = epochMap (podstawowa) LUB epochAlt (alternatywna)
  const isAnswerOk = (id, answer) =>
    answer === epochMap[id] || (epochAlt[id] && answer === epochAlt[id]);

  const submit = () => {
    if (done) return;
    let c = 0;
    items.forEach(w => { if (isAnswerOk(w.id, asgn[w.id])) c++; });
    setCorrect(c); setDone(true);
  };

  const allDone = items.every(w => asgn[w.id]);
  const assigned = Object.keys(asgn).length;

  return <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
    <div style={{ padding:'10px 16px 8px', background:C.surf, borderBottom:`0.5px solid ${C.brd}` }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:7 }}>
        <span style={{ fontSize:13, fontWeight:500, color:C.amber }}>Chronologia</span>
        <span style={{ fontSize:13, color:C.muted }}>Przypisano: <strong style={{ color:C.amber }}>{assigned}</strong> / {items.length}</span>
      </div>
      <div style={{ height:6, background:C.aLight, borderRadius:3 }}>
        <div style={{ width:`${Math.min(100, assigned/items.length*100)}%`, height:'100%', background:C.amber, borderRadius:3, transition:'width 0.3s' }} />
      </div>
    </div>
    <div style={{ flex:1, overflowY:'auto', padding:16, display:'flex', flexDirection:'column', gap:12 }}>
      <div style={{ ...mkCard(), background:C.aLight }}>
        <p style={{ fontSize:11, fontWeight:500, color:C.amber, textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:4 }}>Chronologia</p>
        <p style={{ fontSize:14, color:C.amber }}>Przyporządkuj każdą lekturę do jej epoki literackiej</p>
      </div>
      {items.map(w => {
        const a = asgn[w.id];
        const ep = epochMap[w.id];
        const epAlt = epochAlt[w.id];
        const ok = done && isAnswerOk(w.id, a);
        const err = done && a && !isAnswerOk(w.id, a);
        return <div key={w.id} style={{ ...mkCard(), border:ok?`2px solid ${C.teal}`:err?`2px solid ${C.coral}`:`0.5px solid ${C.brd}` }}>
          <p style={{ fontWeight:500, fontSize:13, marginBottom:8 }}>{w.title}</p>
          <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
            {epochOrder.map(ep2 => (
              <button key={ep2} onClick={() => assign(w.id, ep2)} style={{
                fontSize:11, fontWeight:500, padding:'4px 8px', borderRadius:6, cursor: done?'default':'pointer',
                background: a===ep2 ? (ok?C.teal:err?C.coral:C.amber) : C.aLight,
                color: a===ep2 ? '#fff' : C.amber,
                border:'none', transition:'all 0.15s',
              }}>{ep2}</button>
            ))}
          </div>
          {done && <p style={{ fontSize:12, marginTop:8, color:ok?C.teal:C.coral, lineHeight:1.5 }}>
            {ok
              ? `✓ Poprawnie${epAlt && a===epAlt ? ` (także akceptowane: „${ep}”)` : ''}`
              : epAlt
                ? `✗ Poprawne: „${ep}” lub „${epAlt}”`
                : `✗ Poprawna epoka: „${ep}”`
            }
          </p>}
        </div>;
      })}
      {!done && <button style={{ ...mkBtn('primary'), opacity:allDone?1:0.4 }} disabled={!allDone} onClick={submit}>Sprawdź</button>}
      {done && <>
        <div style={{ ...mkCard(), textAlign:'center', background:correct>=Math.ceil(items.length*0.6)?C.tLight:C.aLight }}>
          <p style={{ fontSize:20, fontWeight:500, color:correct>=Math.ceil(items.length*0.6)?C.teal:C.amber }}>{correct}/{items.length} poprawnych</p>
          <p style={{ fontSize:13, color:C.muted, marginTop:4 }}>Przejrzyj wyniki powyżej, potem kliknij Dalej</p>
        </div>
        <button style={mkBtn('primary')} onClick={() => onDone({ score:correct, total:items.length, xpGained:correct*8, mode:'chrono' })}>Dalej →</button>
      </>}
    </div>
  </div>;
}

function App() {
  const [gs, setGs] = useState(() => ({ ...DEF, ...(loadS()||{}) }));
  const [screen, setScreen] = useState('start');
  const [activeMode, setActiveMode] = useState(null);
  const [lastResult, setLastResult] = useState(null);
  const isGuest = useRef(false);

  useEffect(() => { if (!isGuest.current) saveS(gs); }, [gs]);

  const updateMastery = useCallback((id, correct) => {
    setGs(prev => {
      const m = prev.mastery[id]||{correct:0,total:0};
      return { ...prev,
        mastery: { ...prev.mastery, [id]:{ correct:m.correct+(correct?1:0), total:m.total+1 } },
        totalCorrect: prev.totalCorrect+(correct?1:0),
        totalAnswered: prev.totalAnswered+1,
      };
    });
  }, []);

  const handleDone = useCallback(result => {
    setLastResult(result);
    setGs(prev => { const nx = prev.xp+result.xpGained; return { ...prev, xp:nx, level:calcLevel(nx), sessions:prev.sessions+1 }; });
    setScreen('result');
  }, []);

  const goPlay = mode => { setActiveMode(mode); setScreen('game'); };

  // key on activeMode forces remount only when mode changes, not on state updates
  const gameKey = useRef(0);
  const prevMode = useRef(null);
  if (activeMode !== prevMode.current) { gameKey.current += 1; prevMode.current = activeMode; }

  return <div style={{ flex:1, display:'flex', flexDirection:'column', width:'100%', maxWidth:480, minHeight:0, overflow:'hidden' }}>
    {screen === 'start' && <StartScreen state={gs}
      onStart={type => { if (type==='continue'||gs.onboardingDone) setScreen('dashboard'); else setScreen('onboarding'); }}
      onGuest={() => { isGuest.current=true; setScreen('dashboard'); }} />}
    {screen === 'onboarding' && <OnboardingScreen onDone={lvl => { setGs(s=>({...s,onboardingDone:true})); setScreen('dashboard'); }} />}
    {screen === 'dashboard' && <DashboardScreen state={gs} onPlay={goPlay} onReview={()=>setScreen('review')} onProfile={()=>setScreen('profile')} onSettings={()=>setScreen('settings')} />}
    {screen === 'game' && <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0 }}>
      <Hdr title={MODES.find(m=>m.id===activeMode)?.label||''} onBack={()=>setScreen('dashboard')} />
      {activeMode==='match_motyw' && <MatchMode key={gameKey.current} modeId="match_motyw" onDone={handleDone} onMastery={updateMastery} />}
      {activeMode==='match_lektura' && <MatchMode key={gameKey.current} modeId="match_lektura" onDone={handleDone} onMastery={updateMastery} />}
      {activeMode==='network' && <NetworkMode key={gameKey.current} onDone={handleDone} onMastery={updateMastery} />}
      {activeMode==='scale' && <ScaleMode key={gameKey.current} onDone={handleDone} onMastery={updateMastery} />}
      {activeMode==='constellation' && <ConstellationMode key={gameKey.current} onDone={handleDone} onMastery={updateMastery} />}
      {activeMode==='chrono' && <ChronoMode key={gameKey.current} onDone={handleDone} />}
    </div>}
    {screen === 'result' && lastResult && <ResultScreen result={lastResult} onAgain={()=>setScreen('game')} onReview={()=>setScreen('review')} onDash={()=>setScreen('dashboard')} />}
    {screen === 'review' && <ReviewScreen state={gs} onBack={()=>setScreen('dashboard')} onPlay={goPlay} />}
    {screen === 'profile' && <ProfileScreen state={gs} onBack={()=>setScreen('dashboard')} />}
    {screen === 'settings' && <SettingsScreen state={gs} onBack={()=>setScreen('dashboard')} onSave={upd => { setGs(s=>({...s,...upd})); setScreen('dashboard'); }} />}
  </div>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
